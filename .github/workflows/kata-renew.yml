name: Katabump Auto Renew

on:
  schedule:
    # 每天北京时间上午 9:00 运行一次 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发执行

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests undetected-chromedriver selenium python-dotenv

      - name: Run Renew Script
        env:
          # 在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中设置以下变量
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HEADLESS: "true"
          PAUSE_BETWEEN_ACCOUNTS_MS: "15000"
          # 如果需要代理，也可以添加
          # HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        run: python your_script_name.py # 请确保这里的文件名与你的脚本名一致

      - name: Upload Error Screenshot
        if: failure() # 仅在脚本运行失败时上传截图
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: error-*.png
