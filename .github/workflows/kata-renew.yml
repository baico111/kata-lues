name: Katabump Auto Renew

on:
  schedule:
    # 每 4 天运行一次，北京时间上午 9:00 (UTC 1:00)
    - cron: '0 1 */4 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fix Chrome Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          # 必须清理旧驱动残留，否则 uc 可能会读取缓存的 148 驱动去跑 147 的浏览器
          rm -rf /home/runner/.local/share/undetected_chromedriver

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests undetected-chromedriver selenium python-dotenv

      - name: Run Renew Script
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          HEADLESS: "true"
          PAUSE_BETWEEN_ACCOUNTS_MS: "15000"
          # 重要：通过环境变量强制脚本内 version_main 使用 147
          # 这样脚本第一次启动就能成功，从而避开那个“Options对象复用”的代码报错
          CHROME_VERSION: "147"
        run: python renew_katabump.py

      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: error-*.png
